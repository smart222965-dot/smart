# Configuration for OpenClaw MVP (native macOS)

# Model settings
model:
  provider: ollama
  name: llama-3.2.1

# Database settings
db:
  host: localhost
  port: 5432
  name: openclaw_mvp_db
  user: openclaw_user
  password: your_secure_db_password # Change to a strong password

# Redis settings
redis:
  host: localhost
  port: 6379

# Server settings
server:
  host: 127.0.0.1
  port: 8000

# Safety and permissions
safety:
  confirm_sensitive_actions: true
